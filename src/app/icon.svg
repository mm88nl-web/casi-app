<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Filled rounded-square chrome so the mark holds up at favicon /
       wallet-popup sizes. The earlier strokes-on-transparent file
       rendered as a near-invisible orange smear on Phantom's dark
       theme. Black field is the canonical brand treatment (login
       page, OBS overlay backdrop). -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#050505"/>
  <g transform="translate(56, 156)">
    <g stroke="#F58220" fill="#F58220" stroke-width="20" stroke-linecap="round">
      <line x1="50" y1="60"  x2="350" y2="60"/>
      <line x1="20" y1="100" x2="380" y2="100"/>
      <line x1="50" y1="140" x2="350" y2="140"/>
    </g>
    <path fill="#F58220" stroke="none"
          d="M 90,100 C 130,30 270,30 310,100 C 270,170 130,170 90,100 Z"/>
    <!-- Pupil cutout — same dark as canvas. Original brand treatment. -->
    <circle fill="#050505" cx="200" cy="100" r="45"/>
  </g>
</svg>
